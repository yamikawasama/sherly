<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sherly Panty - รับเติม/ส่งของขวัญ Identity V แบบ Official ได้ใบเสร็จ ราคาถูก ส่งไว">
  <!-- CSP removed: was blocking Firebase WebSocket connections -->
  <title>🐰 Sherly Panty - #IDVMarket103</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐰</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/loading.css">
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-particles"><div class="particle">💕</div><div class="particle">✨</div><div class="particle">🌸</div><div class="particle">⭐</div>
    <div class="particle">💕</div><div class="particle">🐰</div><div class="particle">✨</div><div class="particle">🌸</div></div>
    <div class="bunny-loader" id="loadingImgContainer" style="width:auto;height:auto;"></div>
    <div class="loading-text">กำลังโหลด<span class="loading-dots"></span></div>
    <div class="loading-bar-container"><div class="loading-bar"></div></div>
  </div>

  <div class="app-layout">
    <button class="mobile-toggle" id="mobileToggle">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo" id="sidebarLogo"><img src="assets/images/mascot.png" alt="Mascot" onerror="this.parentElement.innerHTML='🐰'"></div>
        <div class="sidebar-title">Sherly Panty</div>
        <div class="sidebar-subtitle">#IDVMarket103 ♡</div>
        <div class="shop-status open" id="shopStatus"><span class="status-dot"></span>เปิดร้าน</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">เมนูหลัก</div>
        <a class="nav-item active" data-page="home"><span class="nav-icon">🏠</span><span>หน้าแรก</span></a>
        <a class="nav-item" data-page="order"><span class="nav-icon">📋</span><span>สั่งสินค้า</span><span class="nav-badge" id="cartBadge" style="display:none;">0</span></a>
        <a class="nav-item" data-page="gift"><span class="nav-icon">🎁</span><span>ส่งของขวัญ</span></a>
        <a class="nav-item" data-page="rental"><span class="nav-icon">🎮</span><span>ไอดีปล่อยเช่า</span></a>
        <div class="nav-section-title">อื่นๆ</div>
        <a class="nav-item" data-page="myorders" id="myordersNavItem" style="display:none;"><span class="nav-icon">📦</span><span>ออเดอร์ของฉัน</span></a>
        <a class="nav-item" data-page="admin" id="adminNavItem" style="display:none;"><span class="nav-icon">⚙️</span><span>แอดมิน</span></a>
      </nav>
      <div class="sidebar-user"><button class="user-btn" id="userButton"><span class="user-avatar" id="userAvatar">👤</span><span id="userName">เข้าสู่ระบบ</span></button></div>
      <div class="sidebar-footer"><div class="theme-toggle" id="themeToggle"><span style="font-size:0.85rem;">☀️</span><div class="toggle-track"><div class="toggle-thumb">☀️</div></div><span style="font-size:0.85rem;">🌙</span></div></div>
    </aside>

    <main class="main-content">
      <div class="marquee-bar"><div class="marquee-content" id="marqueeText"></div></div>
      <div class="page-container">
        <div class="page-view active" id="page-home"></div>
        <div class="page-view" id="page-order"></div>
        <div class="page-view" id="page-gift"></div>
        <div class="page-view" id="page-rental"></div>
        <div class="page-view" id="page-admin"></div>
        <div class="page-view" id="page-myorders"></div>
        <div class="page-view" id="page-faqdetail"></div>
        <div class="page-view" id="page-promodetail"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="authModal"><div class="modal" style="position:relative;"></div></div>
  <div class="modal-overlay" id="genericModal"><div class="modal" id="genericModalContent" style="position:relative;max-width:560px;"></div></div>
  <div class="lightbox-overlay" id="lightbox" onclick="this.classList.remove('active')"><img id="lightboxImg" src="" alt=""><button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('active')">✕</button></div>

  <!-- Chatbot -->
  <div class="chatbot-container">
    <div class="chatbot-window" id="chatbotWindow">
      <div class="chatbot-header">
        <div style="width:36px;height:36px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;overflow:hidden;" id="chatHeaderImg">🐰</div>
        <div><div style="font-weight:600;font-size:0.9rem;">Sherly Bot</div><div style="font-size:0.75rem;opacity:0.8;">ออนไลน์อยู่ค่ะ ♡</div></div>
      </div>
      <div class="chatbot-messages" id="chatMessages">
        <div class="faq-buttons" style="margin-bottom:8px;">
          <button class="faq-btn" onclick="document.getElementById('chatInput').value='ราคากระดุม';App.sendChat();">💎 ราคากระดุม</button>
          <button class="faq-btn" onclick="document.getElementById('chatInput').value='วิธีสั่งซื้อ';App.sendChat();">📋 วิธีสั่ง</button>
          <button class="faq-btn" onclick="document.getElementById('chatInput').value='พรีไว';App.sendChat();">🔑 พรีไว</button>
          <button class="faq-btn" onclick="document.getElementById('chatInput').value='ติดต่อ';App.sendChat();">📞 ติดต่อ</button>
        </div>
      </div>
      <div class="chatbot-input"><input type="text" id="chatInput" placeholder="พิมพ์ข้อความ..."><button id="chatSend">➤</button></div>
    </div>
    <!-- Bot + Ask Here bounce together -->
    <div class="chatbot-bounce-wrapper" id="chatBounceWrapper">
      <div class="chatbot-ask-bubble" id="askBubble">💬 Ask here</div>
      <button class="chatbot-trigger" id="chatbotTrigger">
        <img src="assets/images/chatbot.png" alt="Bot" id="chatbotTriggerImg" onerror="this.src='';this.parentElement.textContent='🐰'">
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
